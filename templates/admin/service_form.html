{% extends "admin/base.html" %}
{% block content %}
<div class="ket-form-shell">
  <div class="ket-topbar">
    <div class="ket-page-title">
      <h1>{{ title }}</h1>
      <p>{{ cliente.nombre }}</p>
    </div>
    <a class="btn btn-outline-secondary" href="{{ url_for('admin.services_index', client_id=cliente.id) }}"><i data-lucide="x"></i>Cerrar</a>
  </div>

  <form method="post" class="ket-card ket-modal-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3 ket-form-grid">
      <div class="col-md-6">
        <label class="form-label">Nombre</label>
        <input class="form-control" name="nombre" value="{{ servicio.nombre if servicio else '' }}" required>
      </div>
      <div class="col-md-3">
        <label class="form-label">Precio</label>
        <input class="form-control" type="number" step="0.01" min="0" name="precio" value="{{ servicio.precio if servicio and servicio.precio is not none else '' }}">
      </div>
      <div class="col-md-3">
        <label class="form-label">Duracion en minutos</label>
        <input class="form-control" type="number" min="1" name="duracion_minutos" value="{{ servicio.duracion_minutos if servicio else 60 }}" required>
      </div>
      <div class="col-12">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="activo" id="activo" {% if not servicio or servicio.activo %}checked{% endif %}>
          <label class="form-check-label" for="activo">Activo</label>
        </div>
      </div>
    </div>
    <div class="ket-actions justify-content-end mt-4">
      <a class="btn btn-outline-secondary" href="{{ url_for('admin.services_index', client_id=cliente.id) }}">Cancelar</a>
      <button class="btn btn-primary" type="submit"><i data-lucide="save"></i>Guardar</button>
    </div>
  </form>
</div>
{% endblock %}
